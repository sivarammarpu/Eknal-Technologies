<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Collaborator | Eknal Technologies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center
             bg-gradient-to-b from-blue-50 via-white to-indigo-100 relative text-gray-900">

<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 pointer-events-none"></div>

<!-- Logo -->
<div class="absolute top-4 left-4 z-20">
  <a href="{{ url_for('dashboard') }}">
    <img src="{{ url_for('static', filename='eknal_link.png') }}"
         class="h-8 sm:h-10" alt="Eknal Link Logo">
  </a>
</div>

<!-- Flash -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="fixed top-6 right-4 z-50 flex flex-col gap-2">
  {% for category, message in messages %}
  <div class="flash-msg flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-medium
              text-white opacity-0 translate-y-2 transition-all duration-500
              {% if category == 'success' %}bg-green-500{% elif category == 'danger' %}bg-red-500{% else %}bg-indigo-500{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<!-- Main Content -->
<div class="relative z-10 w-full max-w-md mx-4 my-16">
  <div class="bg-white/80 backdrop-blur rounded-2xl shadow-xl p-8">

    <h1 class="text-2xl font-bold text-indigo-700 text-center mb-6">Add New Collaborator</h1>

    <form method="post" class="space-y-4" id="collabForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="name" name="name" required
               placeholder="e.g. Sivaram Marpu"
               class="w-full border border-gray-300 px-4 py-3 rounded-lg text-sm
                      focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" id="email" name="email" required
               placeholder="example@eknal.in"
               class="w-full border border-gray-300 px-4 py-3 rounded-lg text-sm
                      focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
      </div>

      <!-- Resume URL -->
      <div>
        <label for="resume" class="block text-sm font-medium text-gray-700 mb-1">Resume / Portfolio URL</label>
        <input type="url" id="resume" name="resume" required
               placeholder="https://drive.google.com/..."
               class="w-full border border-gray-300 px-4 py-3 rounded-lg text-sm
                      focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
      </div>

      <!-- Contribution -->
      <div>
        <label for="contribution" class="block text-sm font-medium text-gray-700 mb-1">Role / Contribution</label>
        <input type="text" id="contribution" name="contribution" required
               placeholder="e.g. React Developer Intern"
               class="w-full border border-gray-300 px-4 py-3 rounded-lg text-sm
                      focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
      </div>

      <button type="submit"
              class="w-full py-3 rounded-xl font-semibold text-white
                     bg-gradient-to-r from-green-500 to-emerald-400
                     hover:from-emerald-400 hover:to-green-500 transition shadow-md">
        + Add Collaborator
      </button>
    </form>

    <div class="text-center mt-5">
      <a href="{{ url_for('dashboard') }}"
         class="text-gray-400 text-xs hover:text-indigo-500 transition">← Back to Dashboard</a>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="absolute bottom-0 w-full text-center text-gray-400 text-xs py-4 bg-white/20">
  Developed by
  <a href="https://www.linkedin.com/in/sivaram-marpu/" target="_blank" rel="noopener noreferrer"
     class="text-indigo-500 font-semibold hover:underline">Sivaram Marpu (React Intern)</a>
  at
  <a href="https://eknaltechnologies.in" target="_blank" rel="noopener noreferrer"
     class="text-indigo-500 font-semibold hover:underline">Eknal Technologies</a>.
</footer>

<script>
document.querySelectorAll('.flash-msg').forEach((el, i) => {
  setTimeout(() => el.classList.remove('opacity-0','translate-y-2'), 100 + i*80);
  setTimeout(() => el.classList.add('opacity-0'), 2800 + i*80);
  setTimeout(() => el.remove(), 3400 + i*80);
});
</script>
</body>
</html>
