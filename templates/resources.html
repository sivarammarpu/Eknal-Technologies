<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eknal Link | Resources</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-b from-blue-50 via-white to-indigo-100 text-gray-900 relative overflow-x-hidden">

  <!-- Background pattern -->
  <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 pointer-events-none"></div>

  <!-- Logo -->
  <div class="absolute top-4 left-4 z-20">
    <img src="{{ url_for('static', filename='eknal_link.png') }}" alt="Eknal Link Logo" class="h-8 sm:h-12">
  </div>

  <!-- Main Content -->
  <div class="flex-grow flex flex-col items-center px-4 pt-24 pb-12 relative z-10 w-full max-w-3xl mx-auto">

    <!-- Header -->
    <header class="text-center mb-6 px-2">
      <h1 class="text-3xl sm:text-4xl font-bold text-indigo-700 mb-2">Eknal Technologies</h1>
      <p class="text-gray-600 text-sm sm:text-base">Explore your curated Python & project resources</p>
    </header>

    <!-- Links Section -->
    <main class="w-full flex flex-col space-y-4 px-2">
      {% for link in links %}
      <a
        href="{{ link.url }}"
        target="_blank"
        class="block font-semibold text-center py-4 rounded-xl transition transform hover:-translate-y-1 shadow-md
               text-white bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 
               hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 text-sm sm:text-base"
      >
        {{ link.title }}
      </a>
      {% endfor %}

      <!-- Files Section -->
      {% for file in files %}
    <div class="transition transform hover:-translate-y-1 shadow-md bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-semibold p-4 rounded-2xl 
                hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500">
      <div class="flex justify-between items-center">
        <span>{{ file.title }}</span>
        <div class="flex gap-2">
          <a href="{{ url_for('public_download', file_id=file.id) }}" download class="bg-white hover:bg-grey text-black px-3 rounded text-sm">Download</a>
          <a href="{{ url_for('preview_file', file_id=file.id) }}" class="bg-yellow-400 hover:bg-yellow-500 text-black px-3 rounded text-sm">Preview</a>
        </div>
      </div>
      
    </div>
    {% endfor %}
    </main>
  </div>

  <!-- Footer -->
  <footer class="text-center text-gray-500 text-xs sm:text-sm z-10 py-4 mt-auto border-t border-gray-300 w-full px-4">
    <p class="text-center">
      Developed by
      <a
        href="https://www.linkedin.com/in/shalem-raj-putta-054388295/"
        target="_blank"
        class="text-indigo-600 font-semibold hover:underline"
      >
        Shalem Raj (Python Intern)
      </a>
      at
      <a
        href="https://eknaltechnologies.in"
        target="_blank"
        class="text-indigo-600 font-semibold hover:underline"
      >
        Eknal Technologies
      </a>.
    </p>
  </footer>

</body>
</html>
