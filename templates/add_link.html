<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Link | Eknal Technologies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center justify-center py-8 text-gray-900">

<!-- Flash -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="fixed top-6 right-4 z-50 flex flex-col gap-2">
  {% for category, message in messages %}
  <div class="flash-msg flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-sm font-medium
              text-white opacity-0 translate-y-2 transition-all duration-500
              {% if category == 'success' %}bg-green-500{% elif category == 'danger' %}bg-red-500{% else %}bg-indigo-500{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg space-y-6 mx-4">
  <h1 class="text-2xl font-bold text-gray-800 text-center">🔗 Add New Link</h1>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input type="text" id="title" name="title" required
             placeholder="e.g. Python Documentation"
             class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm
                    focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
    </div>

    <div>
      <label for="url" class="block text-sm font-medium text-gray-700 mb-1">URL</label>
      <input type="url" id="url" name="url" required
             placeholder="https://docs.python.org"
             class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm
                    focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
    </div>

    <button type="submit"
            class="w-full py-3 rounded-xl font-semibold text-white
                   bg-gradient-to-r from-indigo-600 to-blue-500
                   hover:from-blue-500 hover:to-indigo-600 transition shadow-md">
      Add Link
    </button>
  </form>

  <div class="text-center">
    <a href="{{ url_for('dashboard') }}"
       class="text-gray-400 text-sm hover:text-indigo-500 transition">← Back to Dashboard</a>
  </div>
</div>

<script>
document.querySelectorAll('.flash-msg').forEach((el, i) => {
  setTimeout(() => el.classList.remove('opacity-0','translate-y-2'), 100 + i*80);
  setTimeout(() => el.classList.add('opacity-0'), 2800 + i*80);
  setTimeout(() => el.remove(), 3400 + i*80);
});
</script>
</body>
</html>
