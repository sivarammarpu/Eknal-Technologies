<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | Eknal Link</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center
             bg-gradient-to-b from-blue-50 via-white to-indigo-100 text-gray-900 relative">

  <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]
              opacity-10 pointer-events-none"></div>

  <div class="relative z-10 text-center px-6 py-16 max-w-md">
    <p class="text-8xl font-black text-indigo-200 mb-2 select-none">404</p>
    <h1 class="text-3xl font-bold text-indigo-700 mb-3">Page Not Found</h1>
    <p class="text-gray-500 mb-8">
      Sorry, the page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/"
       class="inline-block px-7 py-3 rounded-xl text-white font-semibold
              bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500
              hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition shadow-md">
      ← Back to Home
    </a>
  </div>

  <footer class="absolute bottom-0 w-full text-center text-gray-400 text-xs py-4
                 border-t border-gray-200">
    &copy; 2026 Eknal Technologies. Developed by
    <a href="https://www.linkedin.com/in/sivaram-marpu/"
       target="_blank" rel="noopener noreferrer"
       class="text-indigo-500 hover:underline">Sivaram Marpu (React Intern)</a>.
  </footer>

</body>
</html>
